  # ========== CADDY REVERSE PROXY ==========
  caddy:
    image: caddy:2.11.3-alpine
    container_name: caddy_proxy
    restart: unless-stopped
    mem_limit: 128M
    cpus: "0.3"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - medusa_network
    depends_on:
      medusa:
        condition: service_healthy
      # registry:
      #   condition: service_healthy
      # storefront:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ========== VOLUMES ==========
volumes:
  postgres_data:
    name: medusa_postgres_data
  redis_data:
    name: medusa_redis_data
  # meilisearch_data:
  #   name: medusa_meilisearch_data
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
  # registry_data:
  #   name: docker_registry_data
  rustfs_data:
      name: medusa_rustfs_data

# ========== NETWORKS ==========
networks:
  medusa_network:
    name: medusa_network
    driver: bridge
