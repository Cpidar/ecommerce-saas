services:
  # ========== POSTGRESQL DATABASE ==========
  # NOTE: Kept at postgres:16 per user request. Latest LTS is postgres:17.
  postgres:
    image: postgres:16
    container_name: medusa_postgres
    restart: unless-stopped
    mem_limit: 256M
    cpus: "0.5"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ========== REDIS (Cache & Queue) ==========
  redis:
    image: redis:8.8-alpine
    container_name: medusa_redis
    restart: unless-stopped
    mem_limit: 128M
    cpus: "0.3"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - medusa_network
    healthcheck:
      # FIX: must pass -a flag; without it the check always returned healthy
      # even when the server required a password and was rejecting connections.
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ========== MINIO (S3-compatible Storage) ==========
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    ports:
      - "3900:3900"
      - "3901:3901"
    networks:
      - medusa_network
    environment:
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-minioadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-minioadmin}
      - RUSTFS_REGION=${RUSTFS_REGION:-us-east-1}
      - RUSTFS_CONSOLE_ADDRESS=${RUSTFS_CONSOLE_ADDRESS:-http://rustfs:3901}
      - RUSTFS_ADDRESS=${RUSTFS_ENDPOINT:-http://rustfs:3900}
    volumes:
      - rustfs_data:/data  # CHANGED: Use named volume instead of bind mount
    command: server /data --address ":3900" --console-address ":3901"
    mem_limit: 256M
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ========== MEDUSA BACKEND ==========
  medusa:
    image: backend-image:latest
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # meilisearch:
      #   condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - "9000:9000"
      - "5173:5173"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # S3_URL: http://minio:9000
      # S3_BUCKET: medusa
      # S3_REGION: us-east-1
      # S3_ACCESS_KEY_ID: ${MINIO_USER}
      # S3_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      S3_ENDPOINT: ${RUSTFS_ENDPOINT}
      S3_FILE_URL: http://localhost:3900/${RUSTFS_BUCKET}
      S3_BUCKET: ${RUSTFS_BUCKET}
      S3_REGION: ${RUSTFS_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_MASTER_KEY}
    env_file:
      - apps/backend/.env
    networks:
      - medusa_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

